# Alembic configuration for OnCallPilot
# https://alembic.sqlalchemy.org/en/latest/

[alembic]
# Migration scripts directory (relative to this file)
script_location = %(here)s

# Database URL — overridden in env.py from ONCALLPILOT_DATABASE_URL
sqlalchemy.url =

# Disable autogenerate — migrations are written manually
# (no [post_write_hooks] for autogenerate)

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
